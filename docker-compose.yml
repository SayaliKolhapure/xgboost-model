version: '3.8'

services:

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: cancergpt_db
    restart: always
    environment:
      POSTGRES_DB:       cancergpt_db
      POSTGRES_USER:     cancergpt
      POSTGRES_PASSWORD: cancergpt123
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data persists across restarts
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cancergpt -d cancergpt_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask API ───────────────────────────────────────────────────────────────
  api:
    build: .
    container_name: cancergpt_api
    restart: always
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cancergpt:cancergpt123@db:5432/cancergpt_db
      FLASK_ENV:    production
    depends_on:
      db:
        condition: service_healthy   # wait for PostgreSQL to be ready
    volumes:
      - ./cancergpt_best_model.pkl:/app/cancergpt_best_model.pkl:ro
      - ./cancergpt_probe_cols.pkl:/app/cancergpt_probe_cols.pkl:ro
      - ./cancergpt_gdsc_results.csv:/app/cancergpt_gdsc_results.csv:ro
      - ./cancergpt_gdsc_features.csv:/app/cancergpt_gdsc_features.csv:ro
      - ./cancergpt_mutation_model.pkl:/app/cancergpt_mutation_model.pkl:ro
      - ./cancergpt_mutation_results.csv:/app/cancergpt_mutation_results.csv:ro
      - ./cancergpt_mutation_features.csv:/app/cancergpt_mutation_features.csv:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── pgAdmin (visual database browser) ──────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cancergpt_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@cancergpt.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  postgres_data:    # named volume — data survives docker-compose down
